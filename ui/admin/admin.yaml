about:
  date: February 17, 2026 20:48:03
  recent_changes: Added CBSA Steel Derivative Goods Surtax system
  version: 1.0.0
api_root: '{http_type}://{swagger_host}:{port}/{api}'
authentication: '{system-default}'
info:
  number_relationships: 6
  number_tables: 6
info_toggle_checked: true
resources:
  CountryOrigin:
    attributes:
    - label: ' country_name*'
      name: country_name
      search: true
      sort: true
    - name: country_code
      required: true
    - name: surtax_applicable
      type: Boolean
    - name: surtax_rate
      type: DECIMAL
    - name: id
    tab_groups:
    - direction: tomany
      fks:
      - country_origin_id
      name: SurtaxOrderList
      resource: SurtaxOrder
    type: CountryOrigin
    user_key: country_name
  HSCodeRate:
    attributes:
    - label: ' hs_code*'
      name: hs_code
      search: true
      sort: true
    - name: description
      required: true
    - name: base_duty_rate
      type: DECIMAL
      required: true
    - name: surtax_rate
      type: DECIMAL
      required: true
    - name: effective_date
      type: DATE
      required: true
    - name: id
    tab_groups:
    - direction: tomany
      fks:
      - hs_code_id
      name: SurtaxLineItemList
      resource: SurtaxLineItem
    type: HSCodeRate
    user_key: hs_code
  ProvinceTaxRate:
    attributes:
    - label: ' province_name*'
      name: province_name
      search: true
      sort: true
    - name: province_code
      required: true
    - name: tax_type
      required: true
    - name: tax_rate
      type: DECIMAL
      required: true
    - name: effective_date
      type: DATE
      required: true
    - name: id
    tab_groups:
    - direction: tomany
      fks:
      - province_code_id
      name: SurtaxOrderList
      resource: SurtaxOrder
    type: ProvinceTaxRate
    user_key: province_name
  SurtaxOrder:
    attributes:
    - label: ' order_number*'
      name: order_number
      search: true
      sort: true
    - name: entry_date
      type: DATE
      required: true
    - name: ship_date
      type: DATE
      required: true
    - name: country_origin_id
      required: true
    - name: province_code_id
      required: true
    - name: total_customs_value
      type: DECIMAL
    - name: total_duty
      type: DECIMAL
    - name: total_surtax
      type: DECIMAL
    - name: total_pst_hst
      type: DECIMAL
    - name: total_amount_due
      type: DECIMAL
    - name: surtax_applicable
      type: Boolean
    - name: importer_name
    - name: broker_name
    - name: id
    tab_groups:
    - direction: tomany
      fks:
      - surtax_order_id
      name: SurtaxLineItemList
      resource: SurtaxLineItem
    - direction: toone
      fks:
      - country_origin_id
      name: country_origin
      resource: CountryOrigin
    - direction: toone
      fks:
      - province_code_id
      name: province_tax_rate
      resource: ProvinceTaxRate
    type: SurtaxOrder
    user_key: order_number
  SurtaxLineItem:
    attributes:
    - label: ' id*'
      name: id
      search: true
      sort: true
    - name: surtax_order_id
      required: true
    - name: hs_code_id
      required: true
    - name: line_number
      required: true
    - name: description
    - name: quantity
      type: DECIMAL
      required: true
    - name: unit_of_measure
    - name: unit_price
      type: DECIMAL
      required: true
    - name: customs_value
      type: DECIMAL
    - name: duty_rate
      type: DECIMAL
    - name: duty_amount
      type: DECIMAL
    - name: surtax_rate
      type: DECIMAL
    - name: surtax_amount
      type: DECIMAL
    - name: pst_hst_rate
      type: DECIMAL
    - name: pst_hst_amount
      type: DECIMAL
    - name: total_amount
      type: DECIMAL
    tab_groups:
    - direction: toone
      fks:
      - surtax_order_id
      name: surtax_order
      resource: SurtaxOrder
    - direction: toone
      fks:
      - hs_code_id
      name: hs_code_rate
      resource: HSCodeRate
    type: SurtaxLineItem
    user_key: id
  SysScalar:
    attributes:
    - label: ' name*'
      name: name
      search: true
      sort: true
    - name: discount_rate
      type: DECIMAL
    - name: tax_rate
      type: DECIMAL
    - name: notes
    - name: id
    type: SysScalar
    user_key: name
settings:
  HomeJS: /admin-app/home.js
  max_list_columns: 8
  style_guide:
    applicationLocales:
    - en
    - es
    currency_symbol: $
    currency_symbol_position: left
    date_format: LL
    decimal_max: '1000000000'
    decimal_min: '2'
    decimal_separator: .
    detail_mode: tab
    edit_on_mode: dblclick
    exclude_listpicker: false
    include_translation: 'false'
    keycloak_client_id: alsclient
    keycloak_realm: kcals
    keycloak_url: http://localhost:8080
    locale: en
    max_decimal_digits: '4'
    min_decimal_digits: '2'
    new_mode: dialog
    pick_style: list
    row_height: small,
    serviceType: JSONAPI
    startSessionPath: /auth/login
    style: light
    thousand_separator: ','
    use_keycloak: 'false'
